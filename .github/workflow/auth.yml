name: Build and Deploy ConnectHub Authentication to Azure

on:
  push:
    branches:
      - ConnectHub.Authentication   # your branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Publish Auth Service
        run: dotnet publish ./ConnectHub.Authentication/ConnectHub.Authentication.csproj -c Release -o publish

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: ConnectHub-Auth
          publish-profile: ${{ secrets.AUTH}}
          package: ./publish